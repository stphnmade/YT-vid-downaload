name: ci

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r services/downloader/requirements.txt
      - name: Run backend tests
        run: python -m unittest discover -s services/downloader/tests -p "test*.py"

  desktop-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install
      - name: Build renderer
        working-directory: apps/desktop
        run: npm run build
